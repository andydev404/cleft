name: Build Windows

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run tauri build
        working-directory: apps/desktop
        env:
          # Same keypair used for the macOS updater artifacts (generated via
          # `tauri signer generate`) — one keypair signs every platform's
          # release so they all validate against the single pubkey already
          # in tauri.conf.json. Without these two secrets set in the repo's
          # Settings > Secrets and variables > Actions, this step still
          # produces the .exe/.msi installer, just without signed updater
          # artifacts (nsis.zip/.sig) — `tauri build` degrades rather than
          # failing outright when they're unset.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - uses: actions/upload-artifact@v4
        with:
          name: cleft-windows
          path: |
            apps/desktop/src-tauri/target/release/bundle/nsis/*
            apps/desktop/src-tauri/target/release/bundle/msi/*
