name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    # Many repos now default GITHUB_TOKEN to read-only — tauri-action needs
    # write access to create the draft release and upload assets to it.
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
          - platform: windows-latest

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      # tauri-action builds for the current runner's platform, creates (or
      # updates) a single draft GitHub Release for the tag, uploads every
      # platform's installer to it, and — critically — merges each
      # platform's update manifest into one correct multi-platform
      # latest.json, which hand-rolling across two separate build jobs
      # would be easy to get subtly wrong.
      #
      # The APPLE_* vars are no-ops on the windows-latest leg — tauri-cli
      # only applies macOS signing/notarization when actually building for
      # macOS, so it's fine to pass them unconditionally across the matrix
      # rather than branching per-platform here.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Cleft ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
